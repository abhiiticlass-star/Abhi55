<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .box { border: 1px solid #333; padding: 10px; margin: 5px 0; border-radius: 8px; background: #161616; }
        .signal-up { background: #006400; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 5px; }
        .signal-down { background: #8b0000; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 5px; }
        .signal-avoid { background: #b8860b; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 5px; }
        .prob-bar { height: 15px; background: #333; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        .prob-fill { height: 100%; width: 75%; background: #4caf50; }
        select { width: 45%; padding: 8px; background: #222; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

    <h3>ABHI'S ALGO V9.8</h3>
    <div id="clock" style="color: #00ff00; font-weight: bold;">--:--:-- IST</div>

    <div class="box">
        <select id="asset"><option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option></select>
        <select id="tf"><option>1-Min</option><option>5-Min</option></select>
    </div>

    <div id="signal-box" class="signal-avoid">AVOID TRADE 🟡</div>

    <div class="box">
        <div style="font-size: 14px;">Trend M1: <span id="m1-trend">Bullish 🟢</span></div>
        <div style="font-size: 14px;">Trend M5: <span id="m5-trend">Bearish 🔴</span></div>
    </div>

    <div class="box">
        <div>Probability: <span id="prob-val">75%</span></div>
        <div class="prob-bar"><div id="prob-fill" class="prob-fill"></div></div>
        <div style="font-size: 12px; margin-top: 5px;">Layer Structural Confluence</div>
    </div>

    <div id="tradingview_chart" style="margin-top:10px;"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Chart
        new TradingView.widget({"container_id": "tradingview_chart", "width": "100%", "height": 250, "symbol": "FX:EURUSD", "theme": "dark"});

        // Logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' });

            // Weekend Logic
            const day = now.getDay();
            const box = document.getElementById('signal-box');
            if(day === 0 || day === 6) {
                box.innerHTML = "MARKET CLOSED ⚪";
                box.className = "signal-avoid";
                box.style.background = "#555";
            } else {
                // Randomize for now
                const r = Math.random();
                if(r > 0.6) { box.innerHTML = "UP 🟢"; box.className = "signal-up"; }
                else if(r > 0.3) { box.innerHTML = "DOWN 🔴"; box.className = "signal-down"; }
                else { box.innerHTML = "AVOID 🟡"; box.className = "signal-avoid"; }
            }
        }, 2000);
    </script>
</body>
</html>
