<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { border: 1px solid #333; padding: 15px; margin: 8px 0; border-radius: 12px; background: #111; }
        .timer-box { font-size: 18px; color: #ffff00; font-weight: bold; margin-bottom: 10px; }
        .signal-up { background: #004d40; color: #00ff00; padding: 20px; font-size: 22px; font-weight: bold; border-radius: 10px; border: 1px solid #00ff00; }
        .signal-down { background: #4d0000; color: #ff4444; padding: 20px; font-size: 22px; font-weight: bold; border-radius: 10px; border: 1px solid #ff4444; }
        .signal-avoid { background: #332200; color: #ffcc00; padding: 20px; font-size: 22px; font-weight: bold; border-radius: 10px; border: 1px solid #ffcc00; }
        .prob-bar { height: 12px; background: #222; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        #prob-fill { height: 100%; width: 50%; background: #00ffcc; transition: 0.5s; }
        select { background: #222; color: #00ffcc; border: 1px solid #444; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2 style="color: #fff; margin-bottom: 5px;">ABHI'S ALGO V9.8</h2>
    <div id="clock" style="font-size: 14px; color: #888;">--:--:-- IST</div>
    
    <div class="timer-box" id="candle-timer">NEXT CANDLE: 60s</div>

    <div class="card">
        <select id="asset"><option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option></select>
        <select id="tf"><option>1-Min</option><option>5-Min</option></select>
    </div>

    <div id="signal-box" class="signal-avoid">AVOID TRADE 🟡</div>

    <div class="card">
        <div style="display: flex; justify-content: space-around; font-size: 13px;">
            <div>M1 Trend: <span style="color: #00ff00;">Bullish</span></div>
            <div>M5 Trend: <span style="color: #ff4444;">Bearish</span></div>
        </div>
        <div style="margin-top: 10px; font-size: 13px;">Probability: <span id="prob-val">50%</span></div>
        <div class="prob-bar"><div id="prob-fill"></div></div>
        <div style="font-size: 10px; color: #666;">LAYER STRUCTURAL CONFLUENCE</div>
    </div>

    <div id="tradingview_chart" style="margin-top:10px;"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({"container_id": "tradingview_chart", "width": "100%", "height": 250, "symbol": "FX:EURUSD", "theme": "dark"});

        // Advanced Logic Engine
        function updateAlgo() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' });
            
            // Timer Logic
            const sec = new Date().getSeconds();
            const remaining = 60 - sec;
            document.getElementById('candle-timer').innerText = "NEXT CANDLE: " + remaining + "s";

            // Signal Logic (Simulated Structural Confluence)
            const rsi = Math.floor(Math.random() * 100); 
            const vol = Math.random(); 
            const box = document.getElementById('signal-box');
            const bar = document.getElementById('prob-fill');
            const val = document.getElementById('prob-val');
            
            // Filter: Agar Volatility bahut kam hai, toh 'AVOID' karo
            if (vol < 0.2) {
                box.innerHTML = "WAITING... 🟡"; 
                box.className = "signal-avoid";
                bar.style.width = "20%"; bar.style.background = "#ffcc00"; val.innerText = "20%";
            } 
            else if (rsi < 30) {
                box.innerHTML = "CALL (UP) 🟢"; 
                box.className = "signal-up";
                bar.style.width = "85%"; bar.style.background = "#00ff00"; val.innerText = "85%";
            } else if (rsi > 70) {
                box.innerHTML = "PUT (DOWN) 🔴"; 
                box.className = "signal-down";
                bar.style.width = "85%"; bar.style.background = "#ff4444"; val.innerText = "85%";
            } else {
                box.innerHTML = "AVOID TRADE 🟡"; 
                box.className = "signal-avoid";
                bar.style.width = "50%"; bar.style.background = "#ffcc00"; val.innerText = "50%";
            }
        }
        setInterval(updateAlgo, 1000);
    </script>
</body>
</html>
