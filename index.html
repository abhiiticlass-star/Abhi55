<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .box { border: 1px solid #444; padding: 15px; margin: 10px 0; border-radius: 8px; background: #1e1e1e; }
        .signal-up { background: #1b5e20; padding: 20px; font-size: 24px; font-weight: bold; }
        .signal-down { background: #b71c1c; padding: 20px; font-size: 24px; font-weight: bold; }
        .signal-avoid { background: #fbc02d; color: #000; padding: 20px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ABHI'S ALGO V9.8</h1>
    <div id="clock">Loading...</div>

    <div class="box">
        <select id="asset" style="width:100%; padding:10px;">
            <option>EUR/USD</option>
            <option>GBP/USD</option>
        </select>
    </div>

    <div id="signal-box" class="signal-avoid">AVOID TRADE 🟡</div>

    <!-- TradingView Chart -->
    <div id="tradingview_chart" style="margin-top:20px;"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
          "container_id": "tradingview_chart",
          "width": "100%",
          "height": 300,
          "symbol": "FX:EURUSD",
          "interval": "1",
          "theme": "dark"
        });

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' });
        }, 1000);

        // Signal Logic
        setInterval(() => {
            const box = document.getElementById('signal-box');
            const random = Math.random();
            if (random > 0.6) { box.innerHTML = "UP 🟢"; box.className = "signal-up"; }
            else if (random > 0.3) { box.innerHTML = "DOWN 🔴"; box.className = "signal-down"; }
            else { box.innerHTML = "AVOID 🟡"; box.className = "signal-avoid"; }
        }, 5000);
    </script>
</body>
</html>
