<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .pair-card { background: #161616; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        .signal-btn { padding: 8px; border-radius: 5px; font-weight: bold; margin-top: 5px; display: block; }
        .up { background: #006400; color: #00ff00; }
        .down { background: #8b0000; color: #ff4444; }
        .wait { background: #333; color: #fff; }
    </style>
</head>
<body>

    <h2>MULTI-PAIR CONFLUENCE ENGINE</h2>
    <div id="status" style="color: #666; font-size: 12px;">Connecting to Twelve Data...</div>

    <div class="grid-container" id="dashboard">
        <!-- Pairs will be injected here -->
    </div>

    <script>
        const API_KEY = "8e9f4f263cd044cdb3a0a6972179737a";
        const pairs = ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD"];
        
        // Dashboard Setup
        const dashboard = document.getElementById('dashboard');
        pairs.forEach(pair => {
            dashboard.innerHTML += `
                <div class="pair-card">
                    <div>${pair}</div>
                    <div id="price-${pair.replace('/','')}" style="font-size: 18px; color: #00ffcc;">--.--</div>
                    <div id="sig-${pair.replace('/','')}" class="signal-btn wait">WAITING</div>
                </div>
            `;
        });

        // Confluence Logic Engine (Simulated Data processing)
        function processConfluence(pair, price) {
            // Yahan hum RSI/EMA ka Math lagayenge
            const rsi = Math.floor(Math.random() * 100); 
            const signalBox = document.getElementById(`sig-${pair.replace('/','')}`);
            
            if (rsi < 30) {
                signalBox.innerHTML = "BUY 🟢";
                signalBox.className = "signal-btn up";
            } else if (rsi > 70) {
                signalBox.innerHTML = "SELL 🔴";
                signalBox.className = "signal-btn down";
            } else {
                signalBox.innerHTML = "FILTERING... 🟡";
                signalBox.className = "signal-btn wait";
            }
        }

        // Live Data Feed (Mockup for WebSocket Structure)
        setInterval(() => {
            pairs.forEach(pair => {
                const dummyPrice = (Math.random() * (1.1000 - 1.0500) + 1.0500).toFixed(5);
                document.getElementById(`price-${pair.replace('/','')}`).innerText = dummyPrice;
                processConfluence(pair, dummyPrice);
            });
            document.getElementById('status').innerText = "LIVE DATA STREAMING (TwelveData)";
        }, 3000);
    </script>
</body>
</html>
